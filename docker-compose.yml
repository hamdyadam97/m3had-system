version: '3.8'

services:
  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: institute_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Django web server (optional - if you want to use Docker for Django too)
  # Uncomment if needed
  # web:
  #   build: .
  #   container_name: institute_web
  #   command: python manage.py runserver 0.0.0.0:8000
  #   volumes:
  #     - .:/app
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - redis
  #   environment:
  #     - CELERY_BROKER_URL=redis://redis:6379/0
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/0

volumes:
  redis_data:
