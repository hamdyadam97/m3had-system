<div class="modal fade" id="addBranchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>إضافة فرع جديد</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form action="{% url 'branches:branch_add' %}" method="post">
                {% csrf_token %}
<div class="modal-body p-4">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="fw-bold small">اسم الفرع</label>
            {{ branch_form.name }}
        </div>
        <div class="col-md-6">
            <label class="fw-bold small">كود الفرع</label>
            {{ branch_form.code }}
        </div>
        <div class="col-md-6">
            <label class="fw-bold small">رقم الهاتف</label>
            {{ branch_form.phone }}
        </div>
        <div class="col-md-6">
            <label class="fw-bold small">البريد الإلكتروني</label>
            {{ branch_form.email }}
        </div>
        <div class="col-md-12">
            <label class="fw-bold small">العنوان</label>
            {{ branch_form.address }}
        </div>
        <div class="col-md-12">
            <div class="form-check form-switch mt-2">
                {{ branch_form.is_active }}
                <label class="form-check-label ms-2">فرع نشط حالياً</label>
            </div>
        </div>
    </div>
</div>                <div class="modal-footer bg-light d-flex justify-content-between">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">إلغاء</button>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" name="action" value="add_another" class="btn btn-outline-primary">
                            حفظ وإضافة آخر
                        </button>
                        
                        <button type="submit" name="action" value="save_exit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-1"></i> حفظ وخروج
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
