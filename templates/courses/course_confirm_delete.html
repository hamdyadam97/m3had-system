{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-5">
                <i class="fas fa-exclamation-triangle fa-4x text-warning mb-4"></i>
                <h4 class="fw-bold">هل أنت متأكد من أرشفة هذه الدورة؟</h4>
                <p class="text-muted">سيتم إخفاء دورة "{{ course.name }}" من القوائم النشطة، ولكن ستبقى بيانات الطلاب المسجلين فيها محفوظة.</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg px-4 me-2">نعم، قم بالأرشفة</button>
                    <a href="{% url 'courses:course_detail' course.pk %}" class="btn btn-light btn-lg px-4">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
