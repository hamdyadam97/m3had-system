{% extends 'base.html' %}

{% block title %}تسجيل الدخول - نظام إدارة المعاهد{% endblock %}

{% block auth_content %}
<div class="login-page">
    <div class="login-card animate__animated animate__fadeIn">
        <i class="fas fa-graduation-cap"></i>
        <h2>نظام إدارة المعاهد</h2>
        <p class="text-muted">يرجى تسجيل الدخول للمتابعة</p>

        {% if form.errors %}
        <div class="alert alert-danger p-2 small">
            <i class="fas fa-exclamation-circle"></i> اسم المستخدم أو كلمة المرور غير صحيحة.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">اسم المستخدم</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                <i class="fas fa-sign-in-alt me-2"></i> دخول للنظام
            </button>
        </form>
    </div>
</div>
{% endblock %}
