<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white py-3">
                <h5 class="modal-title">
                    <i class="fas fa-user-circle me-2"></i>
                    <span id="modalTitleText">إضافة مستخدم</span>
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="userForm" method="post" novalidate>
                {% csrf_token %}
                <div class="modal-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6" id="usernameContainer">
                            <label class="form-label fw-bold small">اسم المستخدم</label>
                            {{ form.username }}
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">نوع الحساب</label>
                            {{ form.user_type }}
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">الاسم الأول</label>
                            {{ form.first_name }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">اسم العائلة</label>
                            {{ form.last_name }}
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">البريد الإلكتروني</label>
                            {{ form.email }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">رقم الجوال</label>
                            {{ form.phone }}
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold small text-primary">الفرع المرتبط</label>
                            {{ form.branch }}
                        </div>

                        <div id="passwordFields" class="row g-3 m-0 p-0">
                            <div class="col-md-6 ps-0">
                                <label class="form-label fw-bold small text-danger">كلمة المرور</label>
                                {{ form.password1 }}
                            </div>
                            <div class="col-md-6 pe-0">
                                <label class="form-label fw-bold small text-danger">تأكيد كلمة المرور</label>
                                {{ form.password2 }}
                            </div>
                        </div>

                        <div id="statusField" class="col-12 d-none">
                            <div class="p-3 rounded bg-light border d-flex justify-content-between align-items-center">
                                <label class="fw-bold mb-0">حالة الحساب (نشط/معطل)</label>
                                <div class="form-check form-switch scale-150">
                                    {{ form.is_active }}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">إلغاء</button>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm">
                        <i class="fas fa-save me-1"></i> حفظ البيانات
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .scale-150 .form-check-input { transform: scale(1.3); cursor: pointer; }
</style>
