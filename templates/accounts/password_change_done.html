{% extends 'base.html' %}

{% block title %}تم تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
                    </div>
                    <h3 class="mb-3">تم تغيير كلمة المرور بنجاح!</h3>
                    <p class="text-muted mb-4">
                        تم تحديث كلمة المرور الخاصة بك. في المرة القادمة التي تسجل فيها الدخول، 
                        استخدم كلمة المرور الجديدة.
                    </p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'accounts:profile' %}" class="btn btn-primary">
                            <i class="fas fa-user me-2"></i>العودة للملف الشخصي
                        </a>
                        <a href="{% url 'dashboard:dashboard' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-home me-2"></i>الذهاب للوحة التحكم
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
